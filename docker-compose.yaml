services:
  # --- DATABASE LAYER ---
  mongo:
    image: mongo:6.0
    container_name: media_mongo
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - media_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- QUEUE LAYER ---
  redis:
    image: redis:alpine
    container_name: media_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - media_network

  # --- APPLICATION LAYER ---
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: media_api
    restart: always
    ports:
      - "4001:4000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ENDPOINT_EXTERNAL=${MINIO_ENDPOINT_EXTERNAL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - NODE_ENV=${NODE_ENV}
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/database:/app/packages/database
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - media_network

  # --- OBJECT STORAGE ---
  minio:
    image: minio/minio:latest
    container_name: media_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server --console-address ":9001" /data
    volumes:
      - ./data/minio:/data
    networks:
      - media_network

  # --- WORKER ---
  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    container_name: media_worker
    restart: always
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - NODE_ENV=${NODE_ENV}
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages/database:/app/packages/database
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - media_network

  # --- FRONTEND ---
  # client:
  #   build:
  #     context: .
      # environment:
      #   - MONGODB_URI=${MONGODB_URI}
      #   - REDIS_URL=${REDIS_URL}
      #   - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      #   - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      #   - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      #   - NODE_ENV=${NODE_ENV}
  #   volumes:
  #     - ./apps/client/src:/app/src
  #     - ./apps/client/public:/app/public
  #     - ./apps/client/index.html:/app/index.html
  #   depends_on:
  #     - api
  #   networks:
  #     - media_network

networks:
  media_network:
    driver: bridge

volumes:
  mongo_data: